name: Generate O2C Test Status Report

on:
  schedule:
    - cron: '30 1-18 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Setup Google OAuth token
        run: |
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > google-token.json
          echo "Google OAuth token file created"
      
      - name: Generate report from Google Sheets + Jira
        run: node google-sheets-pivot-reporter-oauth-manual.js
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_GID: ${{ secrets.GOOGLE_SHEETS_GID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          JIRA_CLIENT_SECRET: ${{ secrets.JIRA_CLIENT_SECRET }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ENABLE_BUG_REPORTS: ${{ secrets.ENABLE_BUG_REPORTS }}
          ENABLE_PRORATION_CALC: ${{ secrets.ENABLE_PRORATION_CALC }}
      
      - name: Prepare deployment directory
        run: |
          mkdir -p dist
          cp o2c-test-status-report.html dist/index.html
          echo "Report copied to dist/index.html for GitHub Pages deployment"
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: nr-esefw.github.io
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: dist/
          retention-days: 7
